# mistral_qlora.yaml — 8-bit bitsandbytes + LoRA (default for RTX 3060 12GB).
# Full fp16/fp32 weights for 7B do not fit in 12GB; use CPU offload or a smaller model if you need no quantization.

model_name: "mistralai/Mistral-7B-Instruct-v0.2"
# Alternatives: "mistralai/Mistral-7B-v0.1" (base), "mistralai/Mistral-7B-Instruct-v0.3"

# Quantization (only one of load_in_4bit / load_in_8bit should be true)
load_in_4bit: false
load_in_8bit: true
# Used only when load_in_4bit: true (e.g. with optional Unsloth)
bnb_4bit_quant_type: "nf4"
bnb_4bit_use_double_quant: true
bnb_4bit_compute_dtype: "float16"

# LoRA — mirrors Gemma 2B paper config
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"

# Data
train_file: "data/processed/train.jsonl"
val_file: "data/processed/val.jsonl"
max_seq_length: 512    # prompt + human continuation

# Instruction template (stored here for reproducibility — used verbatim in train script)
instruction_template: |
  ### Instruction:
  Rewrite the following AI-generated text to sound natural and human-written.
  Keep the same meaning. Use a conversational tone. Vary sentence length naturally.

  ### Input:
  {ai_text}

  ### Response:
  {human_text}

response_template: "### Response:\n"   # used by DataCollatorForCompletionOnlyLM

# Training — 500 steps to match paper
max_steps: 500           # takes priority over num_train_epochs when set
num_train_epochs: 3      # fallback if max_steps is removed
per_device_train_batch_size: 2
gradient_accumulation_steps: 4    # effective batch = 8
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
optim: "paged_adamw_32bit"
# Trainer mixed precision (weights stay 8-bit via bitsandbytes)
fp16: true
bf16: false
weight_decay: 0.01
max_grad_norm: 1.0
seed: 42

# Evaluation
evaluation_strategy: "no"   # validation loss on causal LM with completion masking is noisy; eval offline
save_strategy: "steps"
save_steps: 100
logging_steps: 25

# Generation (identical to BART for fair comparison)
num_beams: 4
max_new_tokens: 128

# Output
output_dir: "results/mistral_7b"
report_to: "none"
