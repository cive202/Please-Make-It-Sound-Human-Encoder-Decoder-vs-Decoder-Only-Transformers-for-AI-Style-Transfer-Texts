# bart_base.yaml — BART-base seq2seq humanization (bf16)

model_name: "facebook/bart-base"
use_lora: false          # true if OOM on your GPU
lora_r: 16
lora_alpha: 32
lora_target_modules: ["q_proj", "v_proj", "k_proj", "out_proj",
                       "encoder_attn.q_proj", "encoder_attn.v_proj"]

# Data
train_file: "data/processed/train.jsonl"
val_file: "data/processed/val.jsonl"
max_input_length: 256
max_target_length: 256
prefix: "humanize: "

# Training
num_train_epochs: 5
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4     # effective batch = 16
learning_rate: 5.0e-5
lr_scheduler_type: "linear"
warmup_ratio: 0.05
# bfloat16 on Ampere (RTX 30xx) — no fp16 autocast
fp16: false
bf16: true
weight_decay: 0.01
max_grad_norm: 1.0
seed: 42

# Evaluation
evaluation_strategy: "epoch"
save_strategy: "epoch"
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
predict_with_generate: true

# Generation (evaluation — keep identical to Mistral for fair comparison)
num_beams: 4
max_new_tokens: 128

# Output
output_dir: "results/bart_base"
logging_steps: 50
report_to: "none"      # set to "wandb" if you use W&B
